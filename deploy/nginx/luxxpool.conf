# ═══════════════════════════════════════════════════════════
# LUXXPOOL v0.7.0 — Nginx Configuration
# /etc/nginx/sites-available/luxxpool
# ═══════════════════════════════════════════════════════════
#
# Nginx handles:
#   - SSL termination for the API (HTTPS on :443)
#   - Rate limiting on the API
#   - Static dashboard serving (optional)
#   - TCP passthrough for stratum (stream block)
#
# Stratum ports (3333/3334/3336) are NOT proxied through Nginx.
# Miners connect directly to the Node.js TCP server.
# Nginx only proxies the HTTP API.
#
# Install: sudo apt install nginx
# Enable:  sudo ln -s /etc/nginx/sites-available/luxxpool /etc/nginx/sites-enabled/
# Test:    sudo nginx -t
# Reload:  sudo systemctl reload nginx

# Rate limiting zone — 10 req/s per IP for API
limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

# API upstream
upstream luxxpool_api {
    server 127.0.0.1:8080;
    keepalive 32;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name luxxpool.io www.luxxpool.io;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTPS — API + Dashboard
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name luxxpool.io www.luxxpool.io;

    # ─── SSL (Let's Encrypt) ─────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/luxxpool.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/luxxpool.io/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ─── OCSP Stapling (v0.7.0) ────────────────────────
    ssl_stapling on;
    ssl_stapling_verify on;
    ssl_trusted_certificate /etc/letsencrypt/live/luxxpool.io/chain.pem;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # ─── Request Size Limit (v0.7.0) ───────────────────
    client_max_body_size 1m;

    # ─── Security Headers ────────────────────────────────
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ─── API Proxy ───────────────────────────────────────
    location /api/ {
        limit_req zone=api burst=20 nodelay;

        proxy_pass http://luxxpool_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;

        # CORS for dashboard
        add_header Access-Control-Allow-Origin "https://luxxpool-dashboard.vercel.app" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;

        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    # ─── WebSocket Proxy (v0.7.0) ─────────────────────────
    location /ws {
        proxy_pass http://luxxpool_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ─── Admin API (v0.7.0 — restrict to trusted IPs) ──
    location /api/v1/admin/ {
        # Uncomment and set your admin IPs:
        # allow 10.0.0.0/8;
        # allow 192.168.0.0/16;
        # deny all;

        limit_req zone=api burst=10 nodelay;

        proxy_pass http://luxxpool_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─── Health Check (no rate limit) ────────────────────
    location /health {
        proxy_pass http://luxxpool_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # ─── Static Dashboard (optional — if self-hosted) ────
    # Uncomment if serving dashboard from same server
    # location / {
    #     root /var/www/luxxpool-dashboard/dist;
    #     try_files $uri $uri/ /index.html;
    #     expires 1h;
    #     add_header Cache-Control "public, no-transform";
    # }

    # ─── Default: redirect to dashboard ──────────────────
    location / {
        return 302 https://luxxpool-dashboard.vercel.app;
    }
}
