# ═══════════════════════════════════════════════════════════
# LUXXPOOL v0.7.0 — Nginx Production Configuration
#
# Install: sudo cp deploy/nginx.conf /etc/nginx/sites-available/luxxpool
#          sudo ln -s /etc/nginx/sites-available/luxxpool /etc/nginx/sites-enabled/
#          sudo nginx -t && sudo systemctl reload nginx
#
# Requires: nginx with stream module (default in Ubuntu packages)
# ═══════════════════════════════════════════════════════════

# ─── HTTP: API reverse proxy ──────────────────────────────

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=lookup_limit:10m rate=5r/s;
limit_req_zone $binary_remote_addr zone=ws_limit:10m rate=2r/s;

upstream luxxpool_api {
    server 127.0.0.1:8080;
    keepalive 32;
}

server {
    listen 80;
    server_name luxxpool.io www.luxxpool.io;

    # Redirect HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name luxxpool.io www.luxxpool.io;

    # ── SSL (Let's Encrypt) ──
    ssl_certificate /etc/letsencrypt/live/luxxpool.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/luxxpool.io/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_stapling on;
    ssl_stapling_verify on;

    # ── Request body size limit ──
    client_max_body_size 4k;

    # ── Security headers ──
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # ── API proxy ──
    location /api/ {
        limit_req zone=api_limit burst=50 nodelay;

        proxy_pass http://luxxpool_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # CORS for dashboard
        add_header Access-Control-Allow-Origin "https://luxxpool-dashboard.vercel.app" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;

        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    # ── Miner lookup rate limit (stricter) ──
    location /api/v1/miner/ {
        limit_req zone=lookup_limit burst=10 nodelay;
        proxy_pass http://luxxpool_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── Fleet management (restrict to local/VPN only) ──
    location /api/v1/fleet/ {
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        allow 192.168.0.0/16;
        deny all;

        proxy_pass http://luxxpool_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── Health check (no rate limit) ──
    location /health {
        proxy_pass http://luxxpool_api;
    }

    # ── v0.7.0: WebSocket proxy ──
    location /ws {
        limit_req zone=ws_limit burst=5 nodelay;

        proxy_pass http://luxxpool_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── v0.7.0: Admin endpoints (restrict to local/VPN only) ──
    location /api/v1/admin/ {
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        allow 192.168.0.0/16;
        deny all;

        proxy_pass http://luxxpool_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── Block unknown paths ──
    location / {
        return 404;
    }
}

