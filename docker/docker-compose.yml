# ═══════════════════════════════════════════════════════════
# LUXXPOOL — Docker Compose Stack
# Scrypt Multi-Coin Merged Mining Pool
# LTC (parent) + DOGE + BELLS + LKY + PEP + JKC +
#                DINGO + SHIC + TRMP + CRC (auxiliary)
# ═══════════════════════════════════════════════════════════

version: '3.9'

services:
  # ── Pool Application ──────────────────────────────────
  luxxpool:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: luxxpool-pool
    restart: unless-stopped
    ports:
      - "3333:3333"     # Stratum (pool mining)
      - "3334:3334"     # Stratum SSL
      - "3336:3336"     # Solo mining
      - "8080:8080"     # REST API
    env_file:
      - ../.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - pool-logs:/var/log/luxxpool
    networks:
      - luxxpool-net

  # ── PostgreSQL ────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: luxxpool-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: luxxpool
      POSTGRES_USER: luxxpool
      POSTGRES_PASSWORD: ${PG_PASS:-changeme}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U luxxpool"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - luxxpool-net

  # ── Redis ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: luxxpool-redis
    restart: unless-stopped
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru --save 60 1000
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - luxxpool-net

  # ═══════════════════════════════════════════════════════
  # PARENT CHAIN: Litecoin
  # ═══════════════════════════════════════════════════════

  litecoind:
    image: uphold/litecoin-core:latest
    container_name: luxxpool-litecoind
    restart: unless-stopped
    command: >
      -server=1
      -rpcuser=${LTC_USER:-luxxpool_rpc}
      -rpcpassword=${LTC_PASS:-changeme}
      -rpcallowip=0.0.0.0/0
      -rpcbind=0.0.0.0
      -rpcport=9332
      -txindex=1
      -zmqpubhashblock=tcp://0.0.0.0:28332
      -zmqpubhashtx=tcp://0.0.0.0:28333
    ports:
      - "9332:9332"
      - "9333:9333"
      - "28332:28332"
    volumes:
      - ltc-data:/home/litecoin/.litecoin
    networks:
      - luxxpool-net

  # ═══════════════════════════════════════════════════════
  # AUXILIARY CHAINS (AuxPoW merged mining)
  # Uncomment each chain as you deploy its daemon.
  # ═══════════════════════════════════════════════════════

  # ── Dogecoin ──
  dogecoind:
    image: dogecoinfoundation/dogecoin:latest
    container_name: luxxpool-dogecoind
    restart: unless-stopped
    command: >
      -server=1
      -rpcuser=${DOGE_USER:-luxxpool_rpc}
      -rpcpassword=${DOGE_PASS:-changeme}
      -rpcallowip=0.0.0.0/0
      -rpcbind=0.0.0.0
      -rpcport=22555
      -txindex=1
    ports:
      - "22555:22555"
      - "22556:22556"
    volumes:
      - doge-data:/root/.dogecoin
    networks:
      - luxxpool-net
    profiles: ["doge"]

